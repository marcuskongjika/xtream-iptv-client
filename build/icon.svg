<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161b3d"/>
      <stop offset="1" stop-color="#0a0c1e"/>
    </linearGradient>
    <linearGradient id="sail" x1="0.2" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#38e1f2"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <ellipse cx="268" cy="256" rx="210" ry="190" fill="url(#glow)"/>

  <!-- Wind-filled sail doubling as a play button -->
  <path
    d="M 196 128
       C 158 170, 158 342, 196 384
       C 250 356, 330 306, 400 256
       C 330 206, 250 156, 196 128
       Z"
    fill="url(#sail)"/>

  <!-- Vela constellation star -->
  <path
    d="M 352 112 C 356 130, 362 136, 380 140 C 362 144, 356 150, 352 168
       C 348 150, 342 144, 324 140 C 342 136, 348 130, 352 112 Z"
    fill="#e0f2fe" opacity="0.9"/>
  <circle cx="311" cy="176" r="5" fill="#bae6fd" opacity="0.55"/>
</svg>
