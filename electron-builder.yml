appId: com.nxtup.xtream-iptv-client
productName: Xtream IPTV Client
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
npmRebuild: false
win:
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - dmg
  category: public.app-category.video
linux:
  target:
    - AppImage
  category: Video
